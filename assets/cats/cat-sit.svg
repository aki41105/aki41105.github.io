<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 110" role="img" aria-label="">
  <style>
    .tail { transform-box: fill-box; transform-origin: left bottom; animation: sway 3.4s ease-in-out infinite alternate; }
    .eye { transform-box: fill-box; transform-origin: center; animation: blink 4.6s infinite; }
    @keyframes sway { from { transform: rotate(-4deg); } to { transform: rotate(7deg); } }
    @keyframes blink { 0%, 90%, 100% { transform: scaleY(1); } 93%, 96% { transform: scaleY(0.12); } }
  </style>
