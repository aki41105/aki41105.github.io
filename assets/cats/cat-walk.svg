    <path d="M98 48 Q108 50 108 62 Q100 68 94 62 Q94 52 98 48 Z" fill="#3a3532"/>
    <path class="leg-a" d="M52 76 L50 92" fill="none" stroke="#3a3532" stroke-width="3" stroke-linecap="round"/>
    <path class="leg-b" d="M66 76 L66 92" fill="none" stroke="#3a3532" stroke-width="3" stroke-linecap="round"/>
    <path class="leg-a" d="M84 76 L82 92" fill="none" stroke="#3a3532" stroke-width="3" stroke-linecap="round"/>
    <path class="leg-b" d="M98 74 L100 92" fill="none" stroke="#3a3532" stroke-width="3" stroke-linecap="round"/>
    <g>
      <path d="M22 34 L24 18 Q24.5 15 27.5 17 L36 26 Z" fill="#e8933a" stroke="#3a3532" stroke-width="2.2" stroke-linejoin="round"/>
      <path d="M52 32 L54 18 Q54.5 15 51 16 L42 24 Z" fill="#3a3532" stroke="#3a3532" stroke-width="2.2" stroke-linejoin="round"/>
