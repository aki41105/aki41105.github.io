<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 140 100" role="img" aria-label="">
  <style>
    .trot { animation: trot 0.9s ease-in-out infinite; }
    .tail { transform-box: fill-box; transform-origin: left bottom; animation: sway 2.6s ease-in-out infinite alternate; }
    .leg-a { transform-box: fill-box; transform-origin: center top; animation: step 0.9s ease-in-out infinite; }
    .leg-b { transform-box: fill-box; transform-origin: center top; animation: step 0.9s ease-in-out -0.45s infinite; }
    @keyframes trot { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-1.6px); } }
    @keyframes sway { from { transform: rotate(-5deg); } to { transform: rotate(6deg); } }
    @keyframes step { 0%, 100% { transform: rotate(6deg); } 50% { transform: rotate(-6deg); } }
    @media (prefers-reduced-motion: reduce) { * { animation: none !important; } }
  </style>
  <g class="trot">
