  <style>
    .body { transform-box: fill-box; transform-origin: center bottom; animation: breathe 3.8s ease-in-out infinite; }
    .ear-r { transform-box: fill-box; transform-origin: center bottom; animation: twitch 5.2s infinite; }
    .tail { transform-box: fill-box; transform-origin: left bottom; animation: tap 4.4s ease-in-out infinite; }
    @keyframes breathe { 0%, 100% { transform: scale(1, 1); } 50% { transform: scale(1.012, 1.035); } }
    @keyframes twitch { 0%, 86%, 94%, 100% { transform: rotate(0deg); } 90% { transform: rotate(-12deg); } }
    @keyframes tap { 0%, 100% { transform: rotate(0deg); } 50% { transform: rotate(14deg); } }
  </style>
