<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 300" role="img" aria-label="">
  <!-- 大きな三毛猫・線画（背景の透かし用）。丸くなってくつろぐポーズ。
       重なる部品は背景色で塗って下の線を隠す(マスク)方式で線の交差を防ぐ -->
  <style>
    .bigtail { transform-box: fill-box; transform-origin: right bottom; animation: bigsway 7s ease-in-out infinite alternate; }
    @keyframes bigsway { from { transform: rotate(0deg); } to { transform: rotate(4deg); } }
  </style>
  <g stroke="#3f6e54" stroke-width="6" stroke-linecap="round" stroke-linejoin="round">
    <!-- tail: 体の後ろから前へ回り込む(先に描いて体で隠す) -->
    <path class="bigtail" d="M420 200 Q480 190 480 150 Q480 128 458 124" fill="none"/>
    <!-- body: 大きな丸い塊(背景色で塗ってしっぽの根本をマスク) -->
    <path d="M110 250 Q80 170 170 138 Q280 104 380 140 Q450 168 438 220 Q428 258 340 262 L150 262 Q116 262 110 250 Z" fill="#fbf8f1"/>
    <!-- patches on body -->
    <path d="M250 120 Q310 112 360 136 Q340 170 280 166 Q255 146 250 120 Z" fill="#e8933a" fill-opacity="0.5" stroke="none"/>
    <path d="M370 150 Q420 168 424 210 Q390 226 360 200 Q356 168 370 150 Z" fill="#4a4440" fill-opacity="0.42" stroke="none"/>
    <!-- rear haunch: 後ろ足の丸み -->
    <path d="M330 260 Q316 210 356 192" fill="none"/>
    <!-- front paws tucked: 前足 -->
    <path d="M180 262 Q182 244 202 242 Q220 242 222 258 M222 258 Q224 244 244 243 Q262 243 263 258" fill="none"/>
    <!-- ears (頭より先に描く) -->
    <path d="M118 118 L128 70 Q130 61 138 68 L164 92" fill="#e8933a" fill-opacity="0.55"/>
    <path d="M234 116 L228 70 Q227 61 219 67 L192 90" fill="#4a4440" fill-opacity="0.5"/>
    <!-- head: 背景色で塗って体の線をマスク -->
    <ellipse cx="176" cy="152" rx="74" ry="62" fill="#fbf8f1"/>
    <!-- head patches -->
    <path d="M112 132 Q136 106 172 108 Q158 142 120 150 Q110 142 112 132 Z" fill="#e8933a" fill-opacity="0.5" stroke="none"/>
    <path d="M240 132 Q218 106 184 108 Q196 142 232 150 Q242 142 240 132 Z" fill="#4a4440" fill-opacity="0.42" stroke="none"/>
    <!-- closed happy eyes -->
    <path d="M138 162 Q146 170 154 162 M198 162 Q206 170 214 162" fill="none" stroke-width="5"/>
    <!-- nose & mouth -->
    <path d="M170 180 L182 180 L176 188 Z" fill="#3f6e54" stroke="none"/>
    <path d="M176 188 Q176 198 164 200 M176 188 Q176 198 188 200" fill="none" stroke-width="4.5"/>
    <!-- whiskers -->
    <path d="M92 168 L124 172 M94 186 L126 182 M260 168 L228 172 M258 186 L226 182" fill="none" stroke-width="4"/>
  </g>
</svg>
